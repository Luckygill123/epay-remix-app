# fly.toml app configuration file generated for epay-remix-app on 2026-05-24T23:21:39+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'epay-remix-app'
primary_region = 'bom'

[build]

[env]
  PORT = '3000'
  SCOPES = 'read_orders,write_metaobject_definitions,write_metaobjects,write_products'
  SHOPIFY_API_KEY = '98d4057abd8e8ada84a2fb94fce2810d'
  SHOPIFY_APP_URL = 'https://epay-remix-app.fly.dev'

[processes]
  app = 'node ./dbsetup.js npm run docker-start'

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
